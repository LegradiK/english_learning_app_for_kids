{% extends "base.html" %}

{% block content %}
    <div class="stage-tabs">
        <button class="tab-btn {% if active_stage == 'stage1' %}active{% endif %}" 
        onclick="switchStage(1)">⭐ Stage 1 – Tricky Words</button>
        <button class="tab-btn {% if active_stage == 'stage2' %}active{% endif %}" 
        onclick="switchStage(2)">✨ Stage 2 – Vocabulary</button>
        <button class="tab-btn {% if active_stage == 'stage3' %}active{% endif %}" 
        onclick="switchStage(3)">🌟 Stage 3 – Top Frequent Words</button>
        <button class="tab-btn {% if active_stage == 'stage3' %}active{% endif %}" 
        onclick="switchStage(4)">🌠 Stage 4 – Fill the Sentence</button>
    </div>
    <div class="difficulty-and-voices">
        <div class="diff-btns">
            <button class="diff-btn active" data-difficulty="reception" onclick="switchDifficulty(event, 'reception')">🌱 Reception</button>
            <button class="diff-btn" data-difficulty="year1" onclick="switchDifficulty(event, 'year1')">📗 Year 1</button>
            <button class="diff-btn" data-difficulty="year2" onclick="switchDifficulty(event, 'year2')">📘 Year 2</button>
            <button class="diff-btn" data-difficulty="all" onclick="switchDifficulty(event, 'all')">
                <img src="{{ url_for('static', filename='spellbook.png') }}" style="width:1em;height:1em;vertical-align:middle;"> All
            </button>
        </div>
        <div class="voice-btns">
            <button class="speech-voice-btn" data-voice="man" onclick="switchVoices(event, 'man')">
                <img src="{{ url_for('static', filename='man.png') }}" style="width:1em;height:1em;vertical-align:middle;"> Man
            </button>
            <button class="speech-voice-btn active" data-voice="woman" onclick="switchVoices(event, 'woman')">
                <img src="{{ url_for('static', filename='woman.png') }}" style="width:1em;height:1em;vertical-align:middle;"> Woman
            </button>
        </div>
    </div>
    <div class="card">

        <!-- ===== STAGE 1 ===== -->
        <div class="stage-panel active" id="stage1">

        {% include 'stage_1.html' %}

        </div>

        <!-- ===== STAGE 2 ===== -->
        <div class="stage-panel" id="stage2">

        {% include 'stage_2.html' %}

        </div>

        <!-- ===== STAGE 3 ===== -->
        <div class="stage-panel" id="stage3">

        {% include 'stage_3.html' %}

        </div>

        <!-- ===== STAGE 4 ===== -->
        <div class="stage-panel" id="stage4">

        {% include 'stage_4.html' %}

        </div>

    </div>
    
{% endblock %}
