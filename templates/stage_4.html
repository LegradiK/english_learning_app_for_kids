<div class="main-content" id="s4-main">
            <div class="progress-area">
            <span class="progress-label">Progress</span>
            <div class="progress-bar"><div class="progress-fill" id="s4-progress" style="width:0%"></div></div>
            <div class="score-badge">⭐ <span id="s4-score">0</span></div>
            </div>

            <p class="instruction" id="s4-instruction">Press the button to hear a sentence!</p>

            <button class="big-btn btn-listen" id="s4-listen-btn" onclick="s4Listen()">
            🔊 Listen to Sentence
            </button>

            <div class="sentence-display" id="s4-sentence">
            <!-- sentence rendered here -->
            <span style="color:#ccc; font-size:1rem; font-family:'Nunito'; font-weight:700;">Your sentence will appear here...</span>
            </div>

            <div class="btn-row">
            <button class="big-btn btn-reveal" id="s4-reveal-btn" onclick="s4Reveal()" disabled style="opacity:0.4">
                👀 Show Words
            </button>
            <button class="big-btn btn-next" id="s4-next-btn" onclick="s4Next()" disabled style="opacity:0.4">
                Next ➡️
            </button>
            </div>

            <div class="feedback" id="s4-feedback"></div>

            <div class="word-dots" id="s4-dots"></div>
        </div>

        <div class="completion" id="s4-complete">
            <div class="completion-emoji">🌈</div>
            <h2>Superstar!</h2>
            <p>You finished all the sentences!</p>
            <div class="stars" id="s4-stars"></div>
            <br><br>
            <button class="big-btn btn-listen" onclick="restartStage(2)" style="margin-bottom:0">
            🔄 Play Again!
            </button>
        </div>
